name: Deploy Backend to Render

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean install -DskipTests

      - name: Run Tests
        run: ./mvnw test

      # Render auto-deploys on push to main when connected via GitHub
      - name: Notify Deploy
        run: echo "✅ Build successful. Render will auto-deploy from main branch."
