services:
  - type: web
    name: antigravity-backend
    env: java
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/antigravity-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: APP_ENV
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
